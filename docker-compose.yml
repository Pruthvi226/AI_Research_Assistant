services:
  backend:
    build:
      context: ./backend
    container_name: scientia-backend
    init: true
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - scientia-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/system/readiness', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - scientia-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ""
        REACT_APP_ADMIN_API_KEY: ""
    container_name: scientia-frontend
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - scientia-network

volumes:
  scientia-data:

networks:
  scientia-network:
    driver: bridge